<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Missing Topic • EchoLearn</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Add Missing Topic</h1>
    <form method="POST">
        <label for="title">Topic Title</label><br>
        <input type="text" name="title" id="title" required placeholder="e.g., CSS Grid Layout"><br><br>

        <label for="description">Description (optional)</label><br>
        <textarea name="description" id="description" rows="4" placeholder="Quick note..."></textarea><br><br>

        <label for="date_added">Date Added</label><br>
        <input type="date" name="date_added" id="date_added" required><br><br>

        <button type="submit">Add Topic</button>
    </form>

    <a class="floating-back" href="/">Back to Dashboard</a>
</body>
</html>
