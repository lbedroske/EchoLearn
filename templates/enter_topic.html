<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter New Topic • EchoLearn</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Enter New Topic</h1>
    <form method="POST">
        <label for="title">Topic Title</label><br>
        <input type="text" name="title" id="title" required placeholder="e.g., Python List Comprehensions"><br><br>

        <label for="description">Description (optional)</label><br>
        <textarea name="description" id="description" rows="4" placeholder="Quick note or example..."></textarea><br><br>

        <button type="submit">Save Topic for Today</button>
    </form>

    <div class="menu-stack small-menu">
        <a class="menu-option missing-topic" href="/enter-missing-topic">
            Add Missing Topic<br>
            <span>Backfill a past topic with a custom date</span>
        </a>
    </div>

    <a class="floating-back" href="/">Back to Dashboard</a>
</body>
</html>
